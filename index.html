<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleming Systems Terminal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background:
        radial-gradient(circle at top, rgba(0,255,0,0.03), transparent 35%),
        radial-gradient(circle at bottom, rgba(0,255,0,0.025), transparent 35%),
        linear-gradient(to bottom, #010101 0%, #000000 100%);
      color: #0f0;
      font-family: 'Courier New', monospace;
      text-shadow:
        0 0 3px #0f0,
        0 0 8px rgba(0,255,0,0.45),
        0 0 16px rgba(0,255,0,0.15);
      display: flex;
      justify-content: center;
      padding: 40px 20px 80px;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      animation: flicker 0.18s infinite;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.08) 0px,
        rgba(0,255,0,0.08) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.22;
      mix-blend-mode: screen;
      z-index: 1000;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.02)
      );
      opacity: 0.08;
      animation: crtMove 6s linear infinite;
      z-index: 999;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.65) 100%);
      z-index: 998;
    }

    @keyframes crtMove {
      from {
        transform: translateY(-100%);
      }

      to {
        transform: translateY(100%);
      }
    }

    @keyframes flicker {
      0% {
        opacity: 0.98;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.985;
      }
    }

    @keyframes blink {
      0%, 50% {
        opacity: 1;
      }

      51%, 100% {
        opacity: 0;
      }
    }

    .terminal {
      width: 100%;
      max-width: 900px;
      position: relative;
      z-index: 2;
    }

    .content-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
    }

    .content-inner {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 17px;
      text-align: center;
      width: fit-content;
      max-width: 100%;
      position: relative;
      display: inline-block;
    }

    #text {
      display: inline;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 20px;
      background: #0f0;
      vertical-align: middle;
      animation: blink 0.8s infinite;
      margin-left: 2px;
    }

    .auth-terminal {
      margin-top: 40px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .auth-title {
      font-size: 22px;
      margin-bottom: 22px;
      letter-spacing: 2px;
    }

    .cmd-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 700px;
      max-width: 95%;
      padding: 14px 18px;
      border: 2px solid #0f0;
      background: rgba(0,0,0,0.45);
      box-shadow:
        0 0 12px rgba(0,255,0,.5),
        inset 0 0 18px rgba(0,255,0,.15);
    }

    .prompt {
      color: #0f0;
      font-size: 22px;
      white-space: nowrap;
    }

    #terminalInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 22px;
      text-shadow:
        0 0 4px #0f0,
        0 0 10px rgba(0,255,0,0.7);
      caret-color: #0f0;
    }

    .attempts {
      margin-top: 18px;
      width: 100%;
      text-align: center;
      font-size: 12px;
    }

    .success-screen,
    .error-screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: pre-wrap;
      font-size: 30px;
      flex-direction: column;
      line-height: 2;
    }

    .success-screen {
      color: #0f0;
      text-shadow: 0 0 12px #0f0;
    }

    .error-screen {
      color: #ff2a2a;
      text-shadow: 0 0 12px #ff0000;
    }

    .flashbang {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 99999;
    }

    .static-screen {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        #888 0px,
        #777 2px,
        #666 4px,
        #555 6px
      );
      opacity: 0;
      z-index: 99998;
      pointer-events: none;
      animation: staticNoise 0.08s infinite;
    }

    @keyframes staticNoise {
      0% {
        transform: translateX(0);
        filter: contrast(120%);
      }

      25% {
        transform: translateX(-2px);
      }

      50% {
        transform: translateX(2px);
        filter: contrast(180%);
      }

      75% {
        transform: translateY(1px);
      }

      100% {
        transform: translateY(-1px);
      }
    }

    @media (max-width: 768px) {
      .content-inner {
        font-size: 12px;
        line-height: 1.6;
      }

      .cmd-line {
        flex-direction: column;
        gap: 8px;
      }

      .prompt,
      #terminalInput {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="flashbang" id="flashbang"></div>
  <div class="static-screen" id="staticScreen"></div>
  <div class="vignette"></div>

  <div class="terminal">
    <div class="content-wrapper">
      <div class="content-inner">
        <span id="text"></span><span class="cursor" id="cursor"></span>

        <div class="auth-terminal" id="authBox">
          <div class="auth-title">CAMPO DE AUTENTICAÇÃO</div>

          <div class="cmd-line">
            <span class="prompt">C:\FLEMING\AUTH></span>

            <input type="text" maxlength="10" inputmode="numeric" id="terminalInput" autocomplete="off" spellcheck="false" aria-label="Senha do terminal">
          </div>

          <div class="attempts" id="attemptsText">
            [ SISTEMA ] TENTATIVAS RESTANTES: 3
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const terminalText = `
╔════════════════════════════════════════════════════════════╗
║                    FLEMING SYSTEMS INC.                   ║
║             DIVISÃO DE SEGURANÇA E CONTROLE DIGITAL       ║
╚════════════════════════════════════════════════════════════╝

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

ARQUIVO...............: FS-LOCK/22A
CLASSIFICAÇÃO.........: RESTRITO
NÍVEL DE ACESSO.......: V
AUTORIZAÇÃO...........: OBRIGATÓRIA

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

AVISO AO FUNCIONÁRIO:

Para restaurar o acesso ao terminal principal,
o operador deverá reconstruir a sequência numérica
correta através dos cálculos abaixo.

Todos os resultados devem ser inseridos na ordem
em que aparecem no documento.

ERROS REPETIDOS PODEM ACIONAR O BLOQUEIO DO SISTEMA.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[ EQUAÇÃO 01 ]

(7 × 8) - (3² + 25)

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[ EQUAÇÃO 02 ]

((5³ ÷ 5²) + 14) - (3 × 6)

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[ EQUAÇÃO 03 ]

(√225 + 18) - (2³ + 4)

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[ EQUAÇÃO 04 ]

((9 × 7) - 15) ÷ 4

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[ EQUAÇÃO 05 ]

((8² - 22) ÷ 2) + 21

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

SISTEMA AGUARDANDO AUTENTICAÇÃO

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
FLEMING SYSTEMS — INTERNAL USE ONLY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;

    const correctPassword = '2201211242';

    const textElement = document.getElementById('text');
    const cursor = document.getElementById('cursor');
    const authBox = document.getElementById('authBox');
    const attemptsText = document.getElementById('attemptsText');
    const terminal = document.querySelector('.terminal');
    const terminalInput = document.getElementById('terminalInput');

    let currentIndex = 0;
    let attempts = 3;
    let typingFinished = false;

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    function playKeySound() {
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = 'square';
      oscillator.frequency.setValueAtTime(700 + Math.random() * 120, audioContext.currentTime);

      gainNode.gain.setValueAtTime(0.006, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.03);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.03);
    }

    function playSuccessSound() {
      [520, 660, 880].forEach((frequency, index) => {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.value = frequency;

        gainNode.gain.setValueAtTime(0.015, audioContext.currentTime + index * 0.12);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + index * 0.12 + 0.2);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start(audioContext.currentTime + index * 0.12);
        oscillator.stop(audioContext.currentTime + index * 0.12 + 0.2);
      });
    }

    function playErrorSound() {
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = 'sawtooth';
      oscillator.frequency.setValueAtTime(140, audioContext.currentTime);

      gainNode.gain.setValueAtTime(0.02, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.6);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.6);
    }

    function typeWriter() {
      if (currentIndex >= terminalText.length) {
        typingFinished = true;
        authBox.style.display = 'flex';
        cursor.style.display = 'none';
        terminalInput.focus();
        return;
      }

      const character = terminalText[currentIndex];

      textElement.textContent += character;

      if (character !== '\n' && character !== ' ') {
        playKeySound();
      }

      currentIndex++;

      window.scrollTo(0, document.body.scrollHeight);

      const delay = character === '\n' ? 42 : 9;

      setTimeout(typeWriter, delay);
    }

    typeWriter();

    terminalInput.addEventListener('input', () => {
      terminalInput.value = terminalInput.value.replace(/\D/g, '');
    });

    terminalInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        validatePassword();
      }
    });

    function validatePassword() {
      if (!typingFinished) {
        return;
      }

      const enteredPassword = terminalInput.value.trim();
      const isCorrect = enteredPassword === correctPassword;

      if (isCorrect) {
        playSuccessSound();
        showSuccessScreen();
        return;
      }

      attempts--;

      if (attempts <= 0) {
        playErrorSound();
        showErrorScreen();
        return;
      }

      attemptsText.textContent = `[ SISTEMA ] TENTATIVAS RESTANTES: ${attempts}`;

      terminalInput.value = '';
      terminalInput.focus();
    }

    function showSuccessScreen() {
      terminal.innerHTML = `
<div class="success-screen">
████████████████████████████████████

ACESSO GARANTIDO

AUTENTICAÇÃO VALIDADA

BEM-VINDO OPERADOR

████████████████████████████████████
</div>`;
    }

    function showErrorScreen() {
      document.body.innerHTML = `
        <div class="error-screen" id="errorScreen">
████████████████████████████████████
ACESSO NEGADO

FALHA DE AUTENTICAÇÃO

SISTEMA COMPROMETIDO

ENCERRAMENTO EM 10 SEGUNDOS

████████████████████████████████████
        </div>

        <div class="flashbang" id="flashbang"></div>
        <div class="static-screen" id="staticScreen"></div>
      `;

      playErrorSound();

      let countdown = 10;

      const errorScreen = document.getElementById('errorScreen');

      const interval = setInterval(() => {
        countdown--;

        errorScreen.innerHTML = `
████████████████████████████████████

          ACESSO NEGADO

      FALHA DE AUTENTICAÇÃO

      SISTEMA COMPROMETIDO

      APAGANDO ARQUIVOS EM ${countdown}s

████████████████████████████████████
        `;

        if (countdown <= 0) {
          clearInterval(interval);

          const flashbang = document.getElementById('flashbang');
          const staticScreen = document.getElementById('staticScreen');

          flashbang.style.transition = 'opacity 0.08s ease';
          flashbang.style.opacity = '1';

          setTimeout(() => {
            flashbang.style.opacity = '0';

            errorScreen.remove();

            staticScreen.style.opacity = '1';
          }, 120);

          setTimeout(() => {
            document.body.style.transition = 'opacity 2s ease';
            document.body.style.opacity = '0';
          }, 5000);
        }
      }, 1000);
    }

    console.assert(correctPassword === '2201211242', 'Senha final inválida');
    console.assert(typeof correctPassword === 'string', 'A senha deve ser string');
    console.assert(correctPassword.length === 10, 'A senha deve ter 10 dígitos');
    console.assert('\n'.length === 1, 'Newline inválido');
  </script>
</body>
</html>
